<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a472a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Angel Challenge">
    <title>Angel Challenge</title>
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=3">
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png?v=3">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=3">
    <link rel="manifest" href="/manifest.json?v=3">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #156b4a;
            --primary-light: #3ba776;
            --primary-deep: #0d4a35;
            --water: #115e6b;
            --accent: #5ec4a0;
            --success: #1fa971;
            --gold: #f5b942;
            --danger: #e74c3c;
            --text: #233a36;
            --text-light: #7a8c87;
            --border: #e8eeec;
            --card: #ffffff;
            --card-radius: 16px;
            /* Mehrschichtige, weiche Schatten für moderne Tiefe */
            --shadow-sm: 0 1px 2px rgba(13, 74, 53, 0.06), 0 2px 6px rgba(13, 74, 53, 0.08);
            --shadow-md: 0 2px 4px rgba(13, 74, 53, 0.06), 0 6px 16px rgba(13, 74, 53, 0.12);
            --shadow-lg: 0 4px 10px rgba(13, 74, 53, 0.10), 0 12px 32px rgba(13, 74, 53, 0.16);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            /* Tiefe durch radialen Glanz oben + diagonalen Verlauf (passend zum helleren App-Icon) */
            background:
                radial-gradient(120% 80% at 50% -10%, rgba(94, 196, 160, 0.35) 0%, rgba(94, 196, 160, 0) 55%),
                linear-gradient(160deg, #0f7d7e 0%, #126b54 45%, #0d4a35 100%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 90px;
        }

        header {
            background:
                radial-gradient(140% 120% at 50% 0%, rgba(94, 196, 160, 0.45) 0%, rgba(94, 196, 160, 0) 60%),
                linear-gradient(135deg, var(--primary) 0%, var(--primary-deep) 100%);
            color: white;
            padding: 16px 16px;
            padding-top: max(16px, env(safe-area-inset-top));
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 4px 18px rgba(13, 74, 53, 0.28);
        }

        header h1 {
            font-size: 1.6em;
            margin-bottom: 2px;
            letter-spacing: 0.2px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        }

        header p {
            font-size: 0.8em;
            opacity: 0.88;
            letter-spacing: 0.3px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.25s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--text);
            font-size: 0.92em;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
            -webkit-appearance: none;
            appearance: none;
            background-color: white;
            color: var(--text);
        }

        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232c3e50' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 18px;
            padding-right: 42px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(21, 107, 74, 0.1);
        }

        .hint {
            font-size: 0.78em;
            color: var(--text-light);
            margin-top: 5px;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 14px;
            background: white;
            border: 2px dashed var(--primary);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: var(--primary);
        }

        .file-input-label.has-file {
            border-style: solid;
            background: rgba(39, 174, 96, 0.1);
            border-color: var(--success);
            color: var(--success);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            padding: 12px;
        }

        @media (min-width: 700px) {
            .grid {
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            }
        }

        .card {
            background: var(--card);
            border-radius: var(--card-radius);
            padding: 16px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(13, 74, 53, 0.04);
            border-top: 4px solid var(--primary);
        }

        .card.top-1 { border-top: 4px solid var(--gold); box-shadow: 0 4px 10px rgba(245, 185, 66, 0.18), 0 12px 30px rgba(245, 185, 66, 0.22); }
        .card.top-2 { border-top: 4px solid #aab4b0; }
        .card.top-3 { border-top: 4px solid #c08a52; }

        .card-header {
            font-weight: 700;
            font-size: 1.1em;
            color: var(--primary);
            margin-bottom: 12px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.95em;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: var(--text-light);
            font-weight: 500;
        }

        .stat-value {
            color: var(--primary);
            font-weight: 700;
        }

        .stat-value.total {
            color: var(--success);
            font-size: 1.2em;
        }

        /* ===== Fangbuch (Aufbau wie das Original-Sheet) ===== */
        .table-toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 12px 0 12px;
        }

        .table-toolbar label {
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
            font-weight: 700;
            white-space: nowrap;
            margin: 0;
        }

        .table-toolbar select {
            flex: 1;
        }

        .sheet-title {
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
            font-weight: 700;
            font-size: 1.05em;
            padding: 14px 14px 0 14px;
        }

        .species-table {
            background: white;
            border-radius: var(--card-radius);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            margin: 12px;
        }

        .species-table-head {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 12px 14px;
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 0.88em;
        }

        .species-row {
            border-bottom: 1px solid var(--border);
            padding: 9px 14px;
        }

        .species-row:last-child {
            border-bottom: none;
        }

        .species-row.empty {
            padding: 6px 14px;
            background: #fafbfc;
        }

        .species-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .species-name {
            font-weight: 700;
            color: var(--text);
            font-size: 0.93em;
        }

        .species-row.empty .species-name {
            color: #b8c2c8;
            font-weight: 600;
        }

        .species-min {
            font-size: 0.72em;
            color: var(--text-light);
            background: var(--border);
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .species-row.empty .species-min {
            background: transparent;
            color: #c8d0d5;
        }

        .species-catches {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 8px;
        }

        .catch-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(21, 107, 74, 0.06);
            border-left: 3px solid var(--primary);
            border-radius: 8px;
            padding: 8px 10px;
            cursor: pointer;
            min-height: 40px;
        }

        .catch-chip:active {
            background: rgba(21, 107, 74, 0.12);
        }

        .catch-chip.best {
            background: rgba(241, 196, 15, 0.12);
            border-left-color: var(--gold);
        }

        .chip-angler {
            font-weight: 700;
            color: var(--text);
            font-size: 0.88em;
            flex-shrink: 0;
        }

        .chip-len {
            font-weight: 700;
            color: var(--primary);
            font-size: 0.95em;
            text-decoration: underline;
            text-decoration-style: dotted;
            text-underline-offset: 3px;
            flex-shrink: 0;
        }

        .chip-date {
            font-size: 0.7em;
            color: var(--text-light);
            margin-left: auto;
            text-align: right;
            line-height: 1.3;
        }

        .chip-del {
            background: none;
            border: none;
            font-size: 1.05em;
            padding: 4px 6px;
            min-height: auto;
            flex-shrink: 0;
            opacity: 0.75;
            cursor: pointer;
        }

        /* Auswertung unter dem Fangbuch (wie im Sheet) */
        .auswertung {
            background: white;
            border-radius: var(--card-radius);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            margin: 12px;
        }

        .auswertung-head {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 12px 14px;
            font-weight: 700;
            font-size: 0.95em;
        }

        .aus-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9em;
        }

        .aus-row:last-child {
            border-bottom: none;
        }

        .aus-row.top3 {
            background: rgba(21, 107, 74, 0.08);
            font-weight: 700;
        }

        .aus-row.top3 .aus-name {
            color: var(--primary);
        }

        .aus-platz {
            min-width: 70px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .aus-name {
            flex: 1;
            font-weight: 600;
        }

        .aus-cm {
            color: var(--text-light);
            font-size: 0.85em;
            flex-shrink: 0;
        }

        .aus-punkte {
            font-weight: 700;
            color: var(--primary);
            min-width: 55px;
            text-align: right;
            flex-shrink: 0;
        }

        /* Leaderboard */
        .leaderboard {
            background: white;
            border-radius: var(--card-radius);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            margin: 12px;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 14px;
            border-bottom: 1px solid var(--border);
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .rank {
            min-width: 40px;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-right: 12px;
            flex-shrink: 0;
            font-size: 1.05em;
        }

        .rank.rank-1 { background: linear-gradient(135deg, #f1c40f 0%, #e67e22 100%); }
        .rank.rank-2 { background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%); }
        .rank.rank-3 { background: linear-gradient(135deg, #b87333 0%, #a0522d 100%); }

        .leaderboard-info {
            flex: 1;
            min-width: 0;
        }

        .leaderboard-name {
            font-weight: 700;
            color: var(--text);
            margin-bottom: 3px;
            font-size: 0.98em;
        }

        .leaderboard-stats {
            font-size: 0.78em;
            color: var(--text-light);
        }

        .leaderboard-score {
            font-weight: 700;
            font-size: 1.25em;
            color: var(--primary);
            min-width: 55px;
            text-align: right;
            margin-left: 10px;
        }

        /* Rekorde-Tab: größter Fisch pro Art */
        .rekord-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border-bottom: 1px solid var(--border);
        }

        .rekord-row:last-child {
            border-bottom: none;
        }

        .rekord-thumb {
            width: 46px;
            height: 46px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            cursor: pointer;
            border: 2px solid var(--gold);
        }

        .rekord-info {
            flex: 1;
            min-width: 0;
        }

        .rekord-art {
            font-weight: 700;
            color: var(--text);
            font-size: 0.92em;
        }

        .rekord-halter {
            font-size: 0.78em;
            color: var(--text-light);
            margin-top: 2px;
        }

        .rekord-cm {
            font-weight: 700;
            font-size: 1.1em;
            color: var(--primary);
            text-decoration: underline;
            text-decoration-style: dotted;
            text-underline-offset: 3px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            padding: 8px 4px;
        }

        .rekord-leer {
            padding: 30px 20px;
            text-align: center;
            color: var(--text-light);
            font-size: 0.9em;
        }

        /* Info-Tab: Regeln + Fangkalender */
        .info-card {
            background: white;
            border-radius: var(--card-radius);
            box-shadow: var(--shadow-md);
            margin: 12px;
            overflow: hidden;
        }

        .info-card-head {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 12px 14px;
            font-weight: 700;
        }

        .regel-item {
            display: flex;
            gap: 10px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 0.88em;
            line-height: 1.45;
        }

        .regel-item:last-child {
            border-bottom: none;
        }

        .regel-nr {
            font-weight: 700;
            color: var(--primary);
            flex-shrink: 0;
            min-width: 22px;
        }

        details.monat {
            border-bottom: 1px solid var(--border);
        }

        details.monat:last-child {
            border-bottom: none;
        }

        details.monat summary {
            padding: 12px 14px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.92em;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        details.monat summary::after {
            content: '▾';
            color: var(--text-light);
        }

        details.monat[open] summary::after {
            content: '▴';
        }

        details.monat.aktuell summary {
            background: rgba(39, 174, 96, 0.1);
            color: var(--primary);
        }

        .monat-arten {
            padding: 0 14px 12px 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .art-tag {
            border-radius: 12px;
            padding: 4px 10px;
            font-size: 0.78em;
            font-weight: 600;
        }

        /* 3 Fangchancen-Stufen wie in der Original-Excel */
        .art-tag.lvl3 {
            background: #00b050;
            color: white;
        }

        .art-tag.lvl2 {
            background: #92d050;
            color: #1a3a12;
        }

        .art-tag.lvl1 {
            background: #ffd400;
            color: #5a4a00;
        }

        .kalender-legende {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 10px 14px 14px 14px;
            font-size: 0.76em;
            color: var(--text-light);
            border-bottom: 1px solid var(--border);
        }

        .legende-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legende-dot {
            width: 14px;
            height: 14px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        /* Buttons */
        button {
            padding: 13px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.18s ease;
            font-size: 1em;
            min-height: 46px;
        }

        button:active {
            opacity: 0.9;
            transform: scale(0.97);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 55%, var(--primary-deep) 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(21, 107, 74, 0.35);
        }

        /* Lade-Spinner im Speichern-Button */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.35);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: -4px;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        button:disabled {
            opacity: 0.85;
            transform: none;
        }

        .upload-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
            display: none;
        }

        .upload-bar.active {
            display: block;
        }

        .upload-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--success), var(--primary-light));
            border-radius: 3px;
            transition: width 0.25s;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--text);
            color: white;
            padding: 12px 22px;
            border-radius: 30px;
            font-size: 0.9em;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            z-index: 200;
            white-space: nowrap;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }

        /* Foto-Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 300;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            position: relative;
            max-width: 92vw;
            max-height: 88vh;
            display: flex;
            flex-direction: column;
        }

        .modal-img {
            max-width: 92vw;
            max-height: 75vh;
            object-fit: contain;
            border-radius: 12px 12px 0 0;
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.4em;
            min-height: auto;
            padding: 0;
            z-index: 10;
        }

        .modal-info {
            background: white;
            color: var(--text);
            padding: 14px;
            border-radius: 0 0 12px 12px;
            text-align: center;
            font-weight: 700;
        }

        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.6em;
            min-height: auto;
            padding: 0;
            z-index: 10;
            display: none;
        }

        .modal-nav.prev { left: 8px; }
        .modal-nav.next { right: 8px; }
        .modal-nav.visible { display: block; }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.92);
            -webkit-backdrop-filter: saturate(180%) blur(12px);
            backdrop-filter: saturate(180%) blur(12px);
            border-top: 1px solid rgba(13, 74, 53, 0.08);
            display: flex;
            justify-content: space-around;
            padding: 5px 0 max(5px, env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(13, 74, 53, 0.10);
            z-index: 100;
        }

        /* 6 Tabs: kompakt, damit alle nebeneinander passen */
        .nav-item {
            flex: 1;
            min-width: 0;
            text-align: center;
            padding: 6px 1px;
            color: var(--text-light);
            font-size: 0.6em;
            cursor: pointer;
            transition: all 0.2s;
            border-top: 3px solid transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        .nav-item.active {
            color: var(--primary);
            border-top-color: var(--primary);
            background: rgba(21, 107, 74, 0.05);
        }

        .nav-icon {
            font-size: 1.4em;
            margin-bottom: 2px;
            display: block;
        }

        .nav-label {
            display: block;
            font-weight: 600;

            'März': { 'Meerforelle': 3, 'Bachsaibling': 2, 'Döbel': 2, 'Grundel': 2, 'Reg.-Forelle': 2, 'Rotauge': 2, 'Schleie': 2, 'Aal': 1, 'Barbe': 1, 'Barsch': 1, 'Brasse': 1, 'Graskarpfen': 1, 'Gründling': 1, 'Karpfen': 1, 'Rapfen': 1, 'Rotfeder': 1, 'Wels': 1 },
            'April': { 'Bachforelle': 3, 'Bachsaibling': 3, 'Meerforelle': 3, 'Reg.-Forelle': 3, 'Rotauge': 3, 'Schleie': 3, 'Aal': 2, 'Barsch': 2, 'Brasse': 2, 'Döbel': 2, 'Graskarpfen': 2, 'Grundel': 2, 'Hecht': 2, 'Karpfen': 2, 'Rotfeder': 2, 'Barbe': 1, 'Gründling': 1, 'Rapfen': 1, 'Wels': 1 },
            'Mai': { 'Aal': 3, 'Bachforelle': 3, 'Bachsaibling': 3, 'Barsch': 3, 'Brasse': 3, 'Döbel': 3, 'Grundel': 3, 'Hecht': 3, 'Karpfen': 3, 'Reg.-Forelle': 3, 'Rotauge': 3, 'Rotfeder': 3, 'Schleie': 3, 'Barbe': 2, 'Graskarpfen': 2, 'Gründling': 2, 'Meerforelle': 2, 'Wels': 2, 'Zander': 2, 'Rapfen': 1, 'Äsche': 1 },
            'Juni': { 'Aal': 3, 'Bachsaibling': 3, 'Barsch': 3, 'Brasse': 3, 'Döbel': 3, 'Graskarpfen': 3, 'Grundel': 3, 'Gründling': 3, 'Karpfen': 3, 'Rotauge': 3, 'Rotfeder': 3, 'Schleie': 3, 'Wels': 3, 'Zander': 3, 'Bachforelle': 2, 'Barbe': 2, 'Hecht': 2, 'Meerforelle': 2, 'Rapfen': 2, 'Reg.-Forelle': 2, 'Äsche': 1 },
            'Juli': { 'Aal': 3, 'Bachsaibling': 3, 'Barbe': 3, 'Barsch': 3, 'Brasse': 3, 'Döbel': 3, 'Graskarpfen': 3, 'Grundel': 3, 'Gründling': 3, 'Karpfen': 3, 'Rapfen': 3, 'Rotauge': 3, 'Rotfeder': 3, 'Schleie': 3, 'Wels': 3, 'Bachforelle': 2, 'Hecht': 2, 'Meerforelle': 2, 'Reg.-Forelle': 2, 'Zander': 2, 'Äsche': 1 },
            'August': { 'Aal': 3, 'Bachsaibling': 3, 'Barbe': 3, 'Barsch': 3, 'Brasse': 3, 'Döbel': 3, 'Graskarpfen': 3, 'Grundel': 3, 'Gründling': 3, 'Karpfen': 3, 'Rapfen': 3, 'Rotauge': 3, 'Rotfeder': 3, 'Wels': 3, 'Bachforelle': 2, 'Hecht': 2, 'Reg.-Forelle': 2, 'Schleie': 2, 'Zander': 2, 'Meerforelle': 1, 'Äsche': 1 },

            'Oktober': { 'Barsch': 3, 'Hecht': 3, 'Zander': 3, 'Äsche': 3, 'Barbe': 2, 'Brasse': 2, 'Döbel': 2, 'Graskarpfen': 2, 'Grundel': 2, 'Gründling': 2, 'Karpfen': 2, 'Rapfen': 2, 'Rotauge': 2, 'Rotfeder': 2, 'Wels': 2, 'Aal': 1, 'Bachforelle': 1, 'Bachsaibling': 1, 'Reg.-Forelle': 1, 'Schleie': 1 },

        // ===== STATE =====
        let catches = [];

        let deviceId = localStorage.getItem('angelDeviceId');
        if (!deviceId) {
            deviceId = 'dev-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
            localStorage.setItem('angelDeviceId', deviceId);

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2600);
        }

        function minLabel(min) {
            return min > 0 ? 'ab ' + min + ' cm' : 'keins';
        }

        function isBonus(species) {
            return BONUS_SPECIES.includes(species);
        }

        function updatePhotoLabel() {
            const input = document.getElementById('photo');
            const label = document.getElementById('photoLabel');
            if (input.files.length > 0) {
                label.textContent = '✅ Messfoto ausgewählt';
                label.classList.add('has-file');
            } else {
                label.textContent = '📏 Messfoto auswählen';
                label.classList.remove('has-file');
            }
        }

        function updateExtraLabel() {
            const input = document.getElementById('extraPhotos');
            const label = document.getElementById('extraLabel');
            if (input.files.length > 0) {
                label.textContent = `✅ ${input.files.length} Fangfoto${input.files.length > 1 ? 's' : ''} ausgewählt`;
                label.classList.add('has-file');
            } else {
                label.textContent = '📸 Weitere Fotos (bis zu 5)';
                label.classList.remove('has-file');
            }
        }

        function populateSelects() {
            const anglerSelect = document.getElementById('angler');
            anglers.forEach(a => {
                anglerSelect.appendChild(new Option(a, a));
            });

            const fishSelect = document.getElementById('fishType');
            Object.keys(fishSpecies).sort((a, b) => a.localeCompare(b, 'de')).forEach(fish => {
                const star = isBonus(fish) ? '⭐ ' : '';
                const label = `${star}${fish} (${minLabel(fishSpecies[fish])})`;
                fishSelect.appendChild(new Option(label, fish));
            });
            fishSelect.appendChild(new Option('✏️ Andere Fischart…', '__custom__'));

            fishSelect.addEventListener('change', () => {
                document.getElementById('customFishGroup').style.display =
                    fishSelect.value === '__custom__' ? 'block' : 'none';
            });

            // Letzten genutzten Angler im Formular vormerken (jeder nutzt sein eigenes Handy)
            const me = localStorage.getItem('angelChallengeMe');
            if (me && anglers.includes(me)) {
                anglerSelect.value = me;
            }
        }

        function switchTab(tabName, navEl) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            navEl.classList.add('active');
            window.scrollTo(0, 0);
        }

        function setMe(name) {
            if (name) {
                localStorage.setItem('angelChallengeMe', name);
                document.getElementById('angler').value = name;
            } else {
                localStorage.removeItem('angelChallengeMe');
            }
            renderTable();
        }

        // Sortierung des Fangbuchs: 'fisch' (nach Fischart) oder 'angler' (nach Angler)
        let sortMode = localStorage.getItem('angelSortMode') || 'fisch';
        function setSort(mode) {
            sortMode = mode;
            localStorage.setItem('angelSortMode', mode);
            document.getElementById('sortFisch').classList.toggle('active', mode === 'fisch');
            document.getElementById('sortAngler').classList.toggle('active', mode === 'angler');
            renderTable();
        }

        // ===== FOTO-KOMPRIMIERUNG (macht den Upload 10-20x schneller) =====
        async function compressImage(file, maxDim = 1800, quality = 0.82) {
            try {
                let bmp;
                try {
                    bmp = await createImageBitmap(file, { imageOrientation: 'from-image' });
                } catch (e) {
                    bmp = await createImageBitmap(file);
                }
                const scale = Math.min(1, maxDim / Math.max(bmp.width, bmp.height));
                const w = Math.round(bmp.width * scale);
                const h = Math.round(bmp.height * scale);
                const canvas = document.createElement('canvas');
                canvas.width = w;
                canvas.height = h;
                canvas.getContext('2d').drawImage(bmp, 0, 0, w, h);
                const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', quality));
                if (blob && blob.size > 0 && blob.size < file.size) {
                    const name = (file.name || 'foto').replace(/\.\w+$/, '') + '.jpg';
                    return new File([blob], name, { type: 'image/jpeg', lastModified: file.lastModified });
                }
            } catch (e) { /* Komprimierung nicht möglich → Original hochladen */ }
            return file;
        }

        // Upload mit echtem Fortschritt (Prozent)
        function uploadWithProgress(formData, onProgress) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', '/api/catches');
                xhr.timeout = 120000;
                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) onProgress(Math.round((e.loaded / e.total) * 100));
                };
                xhr.onload = () => {
                    let data = {};
                    try { data = JSON.parse(xhr.responseText); } catch (e) { }
                    resolve({ ok: xhr.status >= 200 && xhr.status < 300, status: xhr.status, data });
                };
                xhr.onerror = () => reject(new Error('network'));
                xhr.ontimeout = () => reject(new Error('timeout'));
                xhr.send(formData);
            });
        }

        // ===== EINTRAG =====
        document.getElementById('catchForm').addEventListener('submit', async (e) => {

        // ===== PUNKTEBERECHNUNG (exakt wie die Sheet-Formeln) =====
        // Pro Art zählt nur der größte Fang (Regel 10)
        function bestPerSpecies(angler) {
            const best = {};
            catches.filter(c => c.angler === angler).forEach(c => {
                if (!best[c.fishType] || c.length > best[c.fishType]) {
                    best[c.fishType] = c.length;
                }
            });
            return best;
        }

        // Größter Fang je Bonus-Art über ALLE Angler (für 10er-Bonus)
        function globalMaxPerBonusSpecies() {
            const max = {};
            BONUS_SPECIES.forEach(s => {
                catches.filter(c => c.fishType === s).forEach(c => {
                    if (!max[s] || c.length > max[s]) max[s] = c.length;
                });
            });
            return max;
        }

        function calculatePoints(angler) {
            const best = bestPerSpecies(angler);
            const speciesCaught = Object.keys(best);
            const count = catches.filter(c => c.angler === angler).length;

            // cm Gesamt = Summe der besten Fänge je Art (wie SUM(C4:C46))
            const totalLength = speciesCaught.reduce((sum, s) => sum + best[s], 0);

            // Bonus-Arten-cm (zählen nochmal)
            const bonusCm = BONUS_SPECIES.reduce((sum, s) => sum + (best[s] || 0), 0);

            // Punkte (cm) = INT(gesamt/10) + INT(bonusCm/10)
            const lengthPoints = Math.floor(totalLength / 10) + Math.floor(bonusCm / 10);

            // Punkte (Fischarten) = Arten*3 + Bonus-Arten*3
            const bonusSpeciesCaught = BONUS_SPECIES.filter(s => best[s] !== undefined).length;
            const speciesPoints = speciesCaught.length * 3 + bonusSpeciesCaught * 3;

            // Bonus Größter Fisch: 10 je Bonus-Art, wenn eigener Bestwert = globales Maximum
            const globalMax = globalMaxPerBonusSpecies();
            let biggestFishBonus = 0;
            BONUS_SPECIES.forEach(s => {
                if (best[s] !== undefined && best[s] === globalMax[s]) {
                    biggestFishBonus += 10;
                }
            });

            const totalPoints = lengthPoints + speciesPoints + biggestFishBonus;

            return {
                totalLength,
                lengthPoints,
                speciesPoints,
                biggestFishBonus,
                totalPoints,
                count,
                species: speciesCaught.length
            };
        }

        // Platzierung wie im Sheet: niedrigste Punktzahl = "Schneider" (alle bei Gleichstand)
        function getStandings() {
            const standings = anglers.map(angler => ({ angler, points: calculatePoints(angler) }))
                .sort((a, b) => b.points.totalPoints - a.points.totalPoints);

            const minPoints = Math.min(...standings.map(s => s.points.totalPoints));

            let lastPoints = null, lastRank = 0;
            standings.forEach((s, i) => {
                if (s.points.totalPoints === lastPoints) {
                    s.rank = lastRank; // Gleichstand = gleicher Platz
                } else {
                    s.rank = i + 1;
                    lastRank = s.rank;
                    lastPoints = s.points.totalPoints;
                }
                s.isSchneider = s.points.totalPoints === minPoints;
            });
            return standings;
        }

        function rankSymbol(s) {
            if (s.isSchneider) return ' 🤡';
            if (s.rank === 1) return ' 🏆';
            if (s.rank === 2) return ' 🥈';
            if (s.rank === 3) return ' 🥉';
            return '';
        }

        // Einzelnen Fang als Chip rendern (für beide Sortiermodi)
        function catchChip(c, opts) {
            // Löschknopf nur bei eigenen Fängen (vom Server pro Gerät markiert)
            const mine = !!c.mine;
            const dateStr = c.photoDate || c.date || '';
            const nPhotos = photosOf(c).length;
            const fotoBadge = nPhotos > 1 ? `📷×${nPhotos}` : '📷';
            const pts = pointsForCatch(c);
            const ptsBadge = pts > 0 ? ` · 🎯${pts}` : '';
            // Im Fischart-Modus zeigt der Chip den Angler, im Angler-Modus die Fischart
            const label = opts.show === 'angler'
                ? `${opts.crown ? '👑 ' : ''}${c.angler}`
                : `${opts.crown ? '👑 ' : ''}${isBonus(c.fishType) ? '⭐ ' : ''}${c.fishType}`;
            return `<div class="catch-chip ${opts.best ? 'best' : ''}" onclick="openGallery('${c.id}')">

        // Sortierung nach Fischart (wie Original-Sheet): unter jeder Art die Fänge
        function renderTableBySpecies(container) {
            const sheetSpecies = Object.keys(fishSpecies).sort((a, b) => a.localeCompare(b, 'de'));
            const customSpecies = [...new Set(catches.map(c => c.fishType))]
                .filter(s => !fishSpecies.hasOwnProperty(s))
                .sort((a, b) => a.localeCompare(b, 'de'));

                    .sort((a, b) => b.length - a.length);

        // Sortierung nach Angler: unter jedem Angler seine Fänge (nur die mit Fängen)
        function renderTableByAngler(container) {

            const withCatches = getStandings().filter(s => s.points.count > 0);

        // Rekorde: größter Fisch pro Art — wer hält ihn, cm anklickbar → Foto
        function renderRekorde() {
            const container = document.getElementById('rekordeContainer');

            if (catches.length === 0) {
                container.innerHTML = '<div class="rekord-leer">🎣 Noch keine Fänge — der erste Fisch jeder Art ist automatisch Rekord!</div>';
                return;
            }

            // Pro Art den größten Fang finden (bei Gleichstand: alle Halter)
            const records = {};
            catches.forEach(c => {
                const r = records[c.fishType];
                if (!r || c.length > r.length) {
                    records[c.fishType] = { length: c.length, holders: [c] };
                } else if (c.length === r.length && !r.holders.some(h => h.angler === c.angler)) {
                    r.holders.push(c);
                }
            });

            // Sortiert nach Länge absteigend — der dickste Brocken zuoberst
            const sorted = Object.entries(records).sort((a, b) => b[1].length - a[1].length);

            container.innerHTML = sorted.map(([species, r]) => {
                const star = isBonus(species) ? '⭐ ' : '';
                return r.holders.map((c, i) => {
                    const dateStr = c.photoDate || c.date || '';
                    const nPhotos = photosOf(c).length;
                    const fotoBadge = nPhotos > 1 ? `📷×${nPhotos}` : '📷';
                    return `<div class="rekord-row">

                        <div class="rekord-info">
                            <div class="rekord-art">${star}${species}${r.holders.length > 1 ? ' (geteilt)' : ''}</div>
                            <div class="rekord-halter">👑 ${c.angler} · ${fotoBadge} ${dateStr}${c.weight ? ' · ' + c.weight + ' kg' : ''}</div>
                        </div>
                        <span class="rekord-cm" onclick="openGallery('${c.id}')">${c.length} cm</span>
                    </div>`;
                }).join('');
            }).join('');
        }

        // ===== LÖSCHEN (nur eigene) =====
        async function deleteCatch(id) {
            if (!confirm('Fang wirklich löschen?')) return;
            try {
                const res = await fetch(`/api/catches/${id}?deviceId=${encodeURIComponent(deviceId)}`, { method: 'DELETE' });
                if (res.status === 403) {
                    showToast('🚫 Nur eigene Fänge löschbar!', 'error');
                    return;
                }
                if (!res.ok) throw new Error();
                showToast('🗑️ Fang gelöscht');
                loadCatches();

                showToast('❌ Fehler beim Löschen', 'error');

        // ===== DATEN LADEN (Live-Sync alle 5 Sek.) =====
        async function loadCatches() {
            try {
                const res = await fetch('/api/catches?deviceId=' + encodeURIComponent(deviceId));
                const data = await res.json();
                if (JSON.stringify(data) !== JSON.stringify(catches)) {
                    catches = data;
                    renderAll();
                } else if (!document.body.dataset.rendered) {
                    renderAll();
                    document.body.dataset.rendered = '1';
                }
            } catch (e) { /* offline — nächster Versuch */ }
        }

        // Punkte, die GENAU dieser Fang zur Wertung des Anglers beiträgt (nach Sheet-Regeln)
        function pointsForCatch(c) {
            // Zählt nur, wenn es der größte Fang dieser Art für diesen Angler ist
            const best = bestPerSpecies(c.angler);
            if (best[c.fishType] !== c.length) return 0;
            const factor = isBonus(c.fishType) ? 2 : 1;
            let pts = Math.floor(c.length / 10) * factor; // cm-Punkte
            pts += 3 * factor;                              // Art-Punkte
            // Rekord-Bonus: bei Bonus-Arten +10, wenn globaler Größter
            if (isBonus(c.fishType)) {
                const globalMax = globalMaxPerBonusSpecies();
                if (c.length === globalMax[c.fishType]) pts += 10;
            }
            return pts;
        }

        function timeAgo(c) {
            const ts = c.createdAt || 0;
            if (!ts) return c.date || '';
            const diff = Date.now() - ts;
            const min = Math.floor(diff / 60000);
            if (min < 1) return 'gerade eben';
            if (min < 60) return `vor ${min} Min`;
            const std = Math.floor(min / 60);
            if (std < 24) return `vor ${std} Std`;
            const tage = Math.floor(std / 24);
            if (tage < 7) return `vor ${tage} Tag${tage > 1 ? 'en' : ''}`;
            return 'am ' + (c.date || '');
        }

        // FEED: neueste Fänge oben, großes Foto, Bild-Karussell, Punkte pro Fang
        function renderFeed() {
            const container = document.getElementById('feedContainer');

            if (catches.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🐠</div><p>Noch keine Fänge — sei der Erste!</p></div>';
                return;
            }

            // Neueste zuerst
            const sorted = [...catches].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

            container.innerHTML = sorted.map(c => {
                const photos = photosOf(c);
                const initial = (c.angler || '?').charAt(0).toUpperCase();
                const pts = pointsForCatch(c);
                const isArtRecord = !catches.some(o => o.fishType === c.fishType && o.length > c.length);
                const star = isBonus(c.fishType) ? '<span class="star">⭐</span> ' : '';

                // Bild-Karussell
                const slides = photos.map(p =>
                    `<div class="feed-slide"><img src="${p}" loading="lazy" onclick="openGallery('${c.id}')" alt="${c.fishType}"></div>`
                ).join('');
                const dots = photos.length > 1
                    ? `<div class="feed-dots">${photos.map((_, i) => `<span class="feed-dot ${i === 0 ? 'active' : ''}"></span>`).join('')}</div>`
                    : '';
                const photoCount = photos.length > 1 ? `<div class="feed-photocount">📷 1/${photos.length}</div>` : '';

                // Meta-Chips
                const chips = [];
                chips.push(`<span class="feed-chip">📏 ${c.length} cm</span>`);
                if (c.weight) chips.push(`<span class="feed-chip">⚖️ ${c.weight} kg</span>`);
                if (c.koeder) chips.push(`<span class="feed-chip">🪱 ${c.koeder}</span>`);
                if (c.gewaesser) chips.push(`<span class="feed-chip">🌊 ${c.gewaesser}</span>`);
                if (pts > 0) chips.push(`<span class="feed-chip">🎯 +${pts} Punkte</span>`);
                if (isArtRecord) chips.push(`<span class="feed-chip record">👑 Rekord</span>`);

                return `<div class="feed-card">
                    <div class="feed-head">
                        <div class="feed-avatar">${initial}</div>
                        <div class="feed-head-info">
                            <div class="feed-angler">${c.angler}</div>
                            <div class="feed-when">${timeAgo(c)}${c.photoDate ? ' · 📷 ' + c.photoDate : ''}</div>
                        </div>
                    </div>
                    <div class="feed-carousel">
                        <div class="feed-track" onscroll="feedScroll(this)">${slides}</div>
                        ${photoCount}${dots}
                    </div>
                    <div class="feed-body">
                        <div class="feed-title">${star}${c.fishType}</div>
                        <div class="feed-meta">${chips.join('')}</div>
                        ${c.notes ? `<div class="feed-notes">${c.notes}</div>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        // Karussell: aktiven Punkt + Zähler beim Wischen aktualisieren
        function feedScroll(track) {
            const idx = Math.round(track.scrollLeft / track.clientWidth);
            const carousel = track.parentElement;
            const dots = carousel.querySelectorAll('.feed-dot');
            dots.forEach((d, i) => d.classList.toggle('active', i === idx));
            const counter = carousel.querySelector('.feed-photocount');
            if (counter) counter.textContent = `📷 ${idx + 1}/${dots.length}`;
        }

        function renderAll() {
            renderFeed();
            renderDashboard();
            renderTable();
            renderLeaderboard();
            renderRekorde();
        }

        // ===== START =====
        populateSelects();
        setSort(sortMode); // Sortier-Umschalter auf gespeicherten Stand setzen
        renderInfo();
        renderAll();
        loadCatches();
        setInterval(loadCatches, 5000);
        window.addEventListener('focus', loadCatches);
    </script>
</body>
</html>
