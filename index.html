<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a472a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Angel Challenge">
    <title>Angel Challenge</title>
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=3">
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png?v=3">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=3">
    <link rel="manifest" href="/manifest.json?v=3">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #1a472a;
            --primary-light: #2d6e44;
            --water: #0f3b5c;
            --success: #27ae60;
            --gold: #f1c40f;
            --danger: #e74c3c;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: #ecf0f1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, var(--water) 0%, var(--primary) 100%);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 90px;
        }

        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 14px 16px;
            padding-top: max(14px, env(safe-area-inset-top));
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        header h1 {
            font-size: 1.6em;
            margin-bottom: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 0.8em;
            opacity: 0.9;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.25s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--text);
            font-size: 0.92em;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
            -webkit-appearance: none;
            appearance: none;
            background-color: white;
            color: var(--text);
        }

        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232c3e50' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 18px;
            padding-right: 42px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(26, 71, 42, 0.1);
        }

        .hint {
            font-size: 0.78em;
            color: var(--text-light);
            margin-top: 5px;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 14px;
            background: white;
            border: 2px dashed var(--primary);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: var(--primary);
        }

        .file-input-label.has-file {
            border-style: solid;
            background: rgba(39, 174, 96, 0.1);
            border-color: var(--success);
            color: var(--success);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            padding: 12px;
        }

        @media (min-width: 700px) {
            .grid {
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            }
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-top: 4px solid var(--primary);
        }

        .card.top-1 { border-top: 4px solid var(--gold); box-shadow: 0 2px 14px rgba(241, 196, 15, 0.35); }
        .card.top-2 { border-top: 4px solid #95a5a6; }
        .card.top-3 { border-top: 4px solid #b87333; }

        .card-header {
            font-weight: 700;
            font-size: 1.1em;
            color: var(--primary);
            margin-bottom: 12px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.95em;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: var(--text-light);
            font-weight: 500;
        }

        .stat-value {
            color: var(--primary);
            font-weight: 700;
        }

        .stat-value.total {
            color: var(--success);
            font-size: 1.2em;
        }

        /* ===== Fangbuch (Aufbau wie das Original-Sheet) ===== */
        .table-toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 12px 0 12px;
        }

        .table-toolbar label {
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
            font-weight: 700;
            white-space: nowrap;
            margin: 0;
        }

        .table-toolbar select {
            flex: 1;
        }

        .sheet-title {
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
            font-weight: 700;
            font-size: 1.05em;
            padding: 14px 14px 0 14px;
        }

        .species-table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin: 12px;
        }

        .species-table-head {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 12px 14px;
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 0.88em;
        }

        .species-row {
            border-bottom: 1px solid var(--border);
            padding: 9px 14px;
        }

        .species-row:last-child {
            border-bottom: none;
        }

        .species-row.empty {
            padding: 6px 14px;
            background: #fafbfc;
        }

        .species-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .species-name {
            font-weight: 700;
            color: var(--text);
            font-size: 0.93em;
        }

        .species-row.empty .species-name {
            color: #b8c2c8;
            font-weight: 600;
        }

        .species-min {
            font-size: 0.72em;
            color: var(--text-light);
            background: var(--border);
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .species-row.empty .species-min {
            background: transparent;
            color: #c8d0d5;
        }

        .species-catches {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 8px;
        }

        .catch-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(26, 71, 42, 0.06);
            border-left: 3px solid var(--primary);
            border-radius: 8px;
            padding: 8px 10px;
            cursor: pointer;
            min-height: 40px;
        }

        .catch-chip:active {
            background: rgba(26, 71, 42, 0.12);
        }

        .catch-chip.best {
            background: rgba(241, 196, 15, 0.12);
            border-left-color: var(--gold);
        }

        .chip-angler {
            font-weight: 700;
            color: var(--text);
            font-size: 0.88em;
            flex-shrink: 0;
        }

        .chip-len {
            font-weight: 700;
            color: var(--primary);
            font-size: 0.95em;
            text-decoration: underline;
            text-decoration-style: dotted;
            text-underline-offset: 3px;
            flex-shrink: 0;
        }

        .chip-date {
            font-size: 0.7em;
            color: var(--text-light);
            margin-left: auto;
            text-align: right;
            line-height: 1.3;
        }

        .chip-del {
            background: none;
            border: none;
            font-size: 1.05em;
            padding: 4px 6px;
            min-height: auto;
            flex-shrink: 0;
            opacity: 0.75;
            cursor: pointer;
        }

        /* Auswertung unter dem Fangbuch (wie im Sheet) */
        .auswertung {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin: 12px;
        }

        .auswertung-head {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 12px 14px;
            font-weight: 700;
            font-size: 0.95em;
        }

        .aus-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9em;
        }

        .aus-row:last-child {
            border-bottom: none;
        }

        .aus-row.top3 {
            background: rgba(26, 71, 42, 0.08);
            font-weight: 700;
        }

        .aus-row.top3 .aus-name {
            color: var(--primary);
        }

        .aus-platz {
            min-width: 70px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .aus-name {
            flex: 1;
            font-weight: 600;
        }

        .aus-cm {
            color: var(--text-light);
            font-size: 0.85em;
            flex-shrink: 0;
        }

        .aus-punkte {
            font-weight: 700;
            color: var(--primary);
            min-width: 55px;
            text-align: right;
            flex-shrink: 0;
        }

        /* Leaderboard */
        .leaderboard {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin: 12px;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 14px;
            border-bottom: 1px solid var(--border);
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .rank {
            min-width: 40px;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-right: 12px;
            flex-shrink: 0;
            font-size: 1.05em;
        }

        .rank.rank-1 { background: linear-gradient(135deg, #f1c40f 0%, #e67e22 100%); }
        .rank.rank-2 { background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%); }
        .rank.rank-3 { background: linear-gradient(135deg, #b87333 0%, #a0522d 100%); }

        .leaderboard-info {
            flex: 1;
            min-width: 0;
        }

        .leaderboard-name {
            font-weight: 700;
            color: var(--text);
            margin-bottom: 3px;
            font-size: 0.98em;
        }

        .leaderboard-stats {
            font-size: 0.78em;
            color: var(--text-light);
        }

        .leaderboard-score {
            font-weight: 700;
            font-size: 1.25em;
            color: var(--primary);
            min-width: 55px;
            text-align: right;
            margin-left: 10px;
        }

        /* Rekorde-Tab: größter Fisch pro Art */
        .rekord-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border-bottom: 1px solid var(--border);
        }

        .rekord-row:last-child {
            border-bottom: none;
        }

        .rekord-thumb {
            width: 46px;
            height: 46px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            cursor: pointer;
            border: 2px solid var(--gold);
        }

        .rekord-info {
            flex: 1;
            min-width: 0;
        }

        .rekord-art {
            font-weight: 700;
            color: var(--text);
            font-size: 0.92em;
        }

        .rekord-halter {
            font-size: 0.78em;
            color: var(--text-light);
            margin-top: 2px;
        }

        .rekord-cm {
            font-weight: 700;
            font-size: 1.1em;
            color: var(--primary);
            text-decoration: underline;
            text-decoration-style: dotted;
            text-underline-offset: 3px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            padding: 8px 4px;
        }

        .rekord-leer {
            padding: 30px 20px;
            text-align: center;
            color: var(--text-light);
            font-size: 0.9em;
        }

        /* Info-Tab: Regeln + Fangkalender */
        .info-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin: 12px;
            overflow: hidden;
        }

        .info-card-head {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 12px 14px;
            font-weight: 700;
        }

        .regel-item {
            display: flex;
            gap: 10px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 0.88em;
            line-height: 1.45;
        }

        .regel-item:last-child {
            border-bottom: none;
        }

        .regel-nr {
            font-weight: 700;
            color: var(--primary);
            flex-shrink: 0;
            min-width: 22px;
        }

        details.monat {
            border-bottom: 1px solid var(--border);
        }

        details.monat:last-child {
            border-bottom: none;
        }

        details.monat summary {
            padding: 12px 14px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.92em;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        details.monat summary::after {
            content: '▾';
            color: var(--text-light);
        }

        details.monat[open] summary::after {
            content: '▴';
        }

        details.monat.aktuell summary {
            background: rgba(39, 174, 96, 0.1);
            color: var(--primary);
        }

        .monat-arten {
            padding: 0 14px 12px 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .art-tag {
            border-radius: 12px;
            padding: 4px 10px;
            font-size: 0.78em;
            font-weight: 600;
        }

        /* 3 Fangchancen-Stufen wie in der Original-Excel */
        .art-tag.lvl3 {
            background: #00b050;
            color: white;
        }

        .art-tag.lvl2 {
            background: #92d050;
            color: #1a3a12;
        }

        .art-tag.lvl1 {
            background: #ffd400;
            color: #5a4a00;
        }

        .kalender-legende {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 10px 14px 14px 14px;
            font-size: 0.76em;
            color: var(--text-light);
            border-bottom: 1px solid var(--border);
        }

        .legende-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legende-dot {
            width: 14px;
            height: 14px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        /* Buttons */
        button {
            padding: 13px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1em;
            min-height: 46px;
        }

        button:active {
            opacity: 0.85;
            transform: scale(0.97);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
        }

        /* Lade-Spinner im Speichern-Button */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.35);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: -4px;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        button:disabled {
            opacity: 0.85;
            transform: none;
        }

        .upload-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
            display: none;
        }

        .upload-bar.active {
            display: block;
        }

        .upload-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--success), var(--primary-light));
            border-radius: 3px;
            transition: width 0.25s;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--text);
            color: white;
            padding: 12px 22px;
            border-radius: 30px;
            font-size: 0.9em;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            z-index: 200;
            white-space: nowrap;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }

        /* Foto-Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 300;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            position: relative;
            max-width: 92vw;
            max-height: 88vh;
            display: flex;
            flex-direction: column;
        }

        .modal-img {
            max-width: 92vw;
            max-height: 75vh;
            object-fit: contain;
            border-radius: 12px 12px 0 0;
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.4em;
            min-height: auto;
            padding: 0;
            z-index: 10;
        }

        .modal-info {
            background: white;
            color: var(--text);
            padding: 14px;
            border-radius: 0 0 12px 12px;
            text-align: center;
            font-weight: 700;
        }

        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.6em;
            min-height: auto;
            padding: 0;
            z-index: 10;
            display: none;
        }

        .modal-nav.prev { left: 8px; }
        .modal-nav.next { right: 8px; }
        .modal-nav.visible { display: block; }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 6px 0 max(6px, env(safe-area-inset-bottom));
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.08);
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            padding: 8px 2px;
            color: var(--text-light);
            font-size: 0.68em;
            cursor: pointer;
            transition: all 0.2s;
            border-top: 3px solid transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        .nav-item.active {
            color: var(--primary);
            border-top-color: var(--primary);
            background: rgba(26, 71, 42, 0.05);
        }

        .nav-icon {
            font-size: 1.5em;
            margin-bottom: 2px;
            display: block;
        }

        .nav-label {
            display: block;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.85);
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🎣 Angel Challenge</h1>
        <p>Angelchallenge 2026</p>
    </header>

    <div class="container">
        <!-- DASHBOARD -->
        <div id="dashboard" class="tab-content active">
            <div class="grid" id="dashboardCards"></div>
        </div>

        <!-- EINTRAG -->
        <div id="eintrag" class="tab-content">
            <div class="grid">
                <div class="card">
                    <div class="card-header">📝 Neuen Fang eintragen</div>
                    <form id="catchForm">
                        <div class="form-group">
                            <label>Angler *</label>
                            <select id="angler" required>
                                <option value="">-- Angler wählen --</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Fischart *</label>
                            <select id="fishType" required>
                                <option value="">-- Fischart wählen --</option>
                            </select>
                            <div class="hint">⭐ = Bonus-Art (zählt doppelt!) · Pro Art zählt dein größter Fang</div>
                        </div>

                        <div class="form-group" id="customFishGroup" style="display:none;">

        // ===== FOTO-KOMPRIMIERUNG (macht den Upload 10-20x schneller) =====
        async function compressImage(file, maxDim = 1800, quality = 0.82) {
            try {
                let bmp;
                try {
                    bmp = await createImageBitmap(file, { imageOrientation: 'from-image' });
                } catch (e) {
                    bmp = await createImageBitmap(file);
                }
                const scale = Math.min(1, maxDim / Math.max(bmp.width, bmp.height));
                const w = Math.round(bmp.width * scale);
                const h = Math.round(bmp.height * scale);
                const canvas = document.createElement('canvas');
                canvas.width = w;
                canvas.height = h;
                canvas.getContext('2d').drawImage(bmp, 0, 0, w, h);
                const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', quality));
                if (blob && blob.size > 0 && blob.size < file.size) {
                    const name = (file.name || 'foto').replace(/\.\w+$/, '') + '.jpg';
                    return new File([blob], name, { type: 'image/jpeg', lastModified: file.lastModified });
                }
            } catch (e) { /* Komprimierung nicht möglich → Original hochladen */ }
            return file;
        }

        // Upload mit echtem Fortschritt (Prozent)
        function uploadWithProgress(formData, onProgress) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', '/api/catches');
                xhr.timeout = 120000;
                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) onProgress(Math.round((e.loaded / e.total) * 100));
                };
                xhr.onload = () => {
                    let data = {};
                    try { data = JSON.parse(xhr.responseText); } catch (e) { }
                    resolve({ ok: xhr.status >= 200 && xhr.status < 300, status: xhr.status, data });
                };
                xhr.onerror = () => reject(new Error('network'));
                xhr.ontimeout = () => reject(new Error('timeout'));
                xhr.send(formData);
            });
        }

        // ===== EINTRAG =====
        document.getElementById('catchForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const angler = document.getElementById('angler').value;
            let fishType = document.getElementById('fishType').value;
            if (fishType === '__custom__') {
                fishType = document.getElementById('customFish').value.trim();

            if (isNaN(length) || length <= 0) {

                return;

            if (length < minSize) {
                showToast(`❌ Mindestmaß ${fishType}: ${minSize} cm!`, 'error');
                return;

            const saveBtn = document.getElementById('saveBtn');
            const bar = document.getElementById('uploadBar');
            const barFill = document.getElementById('uploadBarFill');
            saveBtn.disabled = true;

            try {
                // 1. Fotos verkleinern (8 MB Handy-Foto → ~0,4 MB)
                saveBtn.innerHTML = '<span class="spinner"></span>Fotos werden verkleinert…';
                const photoSmall = await compressImage(photo);
                const extras = document.getElementById('extraPhotos').files;
                const extrasSmall = [];
                for (let i = 0; i < Math.min(extras.length, 5); i++) {
                    extrasSmall.push(await compressImage(extras[i]));

                const formData = new FormData();

                formData.append('weight', document.getElementById('weight').value);

                if (!res.ok) {

                localStorage.setItem('angelChallengeMe', angler);

                barFill.style.width = '0%';

        // ===== PUNKTEBERECHNUNG (exakt wie die Sheet-Formeln) =====
        // Pro Art zählt nur der größte Fang (Regel 10)
        function bestPerSpecies(angler) {
            const best = {};
            catches.filter(c => c.angler === angler).forEach(c => {
                if (!best[c.fishType] || c.length > best[c.fishType]) {
                    best[c.fishType] = c.length;
                }
            });
            return best;
        }

        // Größter Fang je Bonus-Art über ALLE Angler (für 10er-Bonus)
        function globalMaxPerBonusSpecies() {
            const max = {};
            BONUS_SPECIES.forEach(s => {
                catches.filter(c => c.fishType === s).forEach(c => {
                    if (!max[s] || c.length > max[s]) max[s] = c.length;
                });
            });
            return max;
        }

        function calculatePoints(angler) {
            const best = bestPerSpecies(angler);
            const speciesCaught = Object.keys(best);
            const count = catches.filter(c => c.angler === angler).length;

            // cm Gesamt = Summe der besten Fänge je Art (wie SUM(C4:C46))
            const totalLength = speciesCaught.reduce((sum, s) => sum + best[s], 0);

            // Bonus-Arten-cm (zählen nochmal)
            const bonusCm = BONUS_SPECIES.reduce((sum, s) => sum + (best[s] || 0), 0);

            // Punkte (cm) = INT(gesamt/10) + INT(bonusCm/10)
            const lengthPoints = Math.floor(totalLength / 10) + Math.floor(bonusCm / 10);

            // Punkte (Fischarten) = Arten*3 + Bonus-Arten*3
            const bonusSpeciesCaught = BONUS_SPECIES.filter(s => best[s] !== undefined).length;
            const speciesPoints = speciesCaught.length * 3 + bonusSpeciesCaught * 3;

            // Bonus Größter Fisch: 10 je Bonus-Art, wenn eigener Bestwert = globales Maximum
            const globalMax = globalMaxPerBonusSpecies();
            let biggestFishBonus = 0;
            BONUS_SPECIES.forEach(s => {
                if (best[s] !== undefined && best[s] === globalMax[s]) {
                    biggestFishBonus += 10;
                }
            });

            const totalPoints = lengthPoints + speciesPoints + biggestFishBonus;

            return {
                totalLength,
                lengthPoints,
                speciesPoints,
                biggestFishBonus,
                totalPoints,
                count,
                species: speciesCaught.length
            };
        }

        // Platzierung wie im Sheet: niedrigste Punktzahl = "Schneider" (alle bei Gleichstand)
        function getStandings() {
            const standings = anglers.map(angler => ({ angler, points: calculatePoints(angler) }))
                .sort((a, b) => b.points.totalPoints - a.points.totalPoints);

            const minPoints = Math.min(...standings.map(s => s.points.totalPoints));

            let lastPoints = null, lastRank = 0;
            standings.forEach((s, i) => {
                if (s.points.totalPoints === lastPoints) {
                    s.rank = lastRank; // Gleichstand = gleicher Platz
                } else {
                    s.rank = i + 1;
                    lastRank = s.rank;
                    lastPoints = s.points.totalPoints;
                }
                s.isSchneider = s.points.totalPoints === minPoints;
            });
            return standings;
        }

        function rankSymbol(s) {
            if (s.isSchneider) return ' 🤡';
            if (s.rank === 1) return ' 🏆';
            if (s.rank === 2) return ' 🥈';
            if (s.rank === 3) return ' 🥉';
            return '';
        }

        // ===== RENDERING =====
        function renderDashboard() {
            const container = document.getElementById('dashboardCards');
            container.innerHTML = '';

            getStandings().forEach(s => {
                const p = s.points;
                const topClass = !s.isSchneider && s.rank <= 3 ? `top-${s.rank}` : '';
                const placeLabel = s.isSchneider ? 'Schneider' : `Platz ${s.rank}`;

                const card = document.createElement('div');
                card.className = 'card ' + topClass;
                card.innerHTML = `
                    <div class="card-header">${s.rank}. ${s.angler}${rankSymbol(s)}<span style="float:right;font-size:0.75em;color:var(--text-light);font-weight:600;">${placeLabel}</span></div>
                    <div class="stat-row"><span class="stat-label">cm Gesamt:</span><span class="stat-value">${p.totalLength} cm</span></div>
                    <div class="stat-row"><span class="stat-label">Fischarten:</span><span class="stat-value">${p.species}</span></div>
                    <div class="stat-row"><span class="stat-label">Fänge:</span><span class="stat-value">${p.count}</span></div>
                    <div class="stat-row" style="margin-top:8px;border-top:2px solid var(--border);padding-top:8px;"><span class="stat-label">Punkte (cm):</span><span class="stat-value">${p.lengthPoints}</span></div>
                    <div class="stat-row"><span class="stat-label">Punkte (Fischarten):</span><span class="stat-value">${p.speciesPoints}</span></div>
                    <div class="stat-row"><span class="stat-label">Bonus Größter Fisch:</span><span class="stat-value">${p.biggestFishBonus}</span></div>
                    <div class="stat-row" style="font-size:1.05em;font-weight:700;border-top:2px solid var(--primary);padding-top:8px;margin-top:8px;"><span class="stat-label">GESAMTPUNKTE:</span><span class="stat-value total">${p.totalPoints}</span></div>
                `;
                container.appendChild(card);
            });
        }

        // Fangbuch: Fischarten als Zeilen (wie das Sheet), Fänge als Chips
        function renderTable() {
            const container = document.getElementById('speciesTableContainer');
            const me = localStorage.getItem('angelChallengeMe') || '';

            // Arten aus dem Sheet + zusätzlich eingetragene eigene Arten (die 5 freien Zeilen)
            const sheetSpecies = Object.keys(fishSpecies).sort((a, b) => a.localeCompare(b, 'de'));
            const customSpecies = [...new Set(catches.map(c => c.fishType))]
                .filter(s => !fishSpecies.hasOwnProperty(s))
                .sort((a, b) => a.localeCompare(b, 'de'));
            const allSpecies = [...sheetSpecies, ...customSpecies];

            let html = '<div class="species-table-head"><span>Fischart</span><span>Fänge (antippen = Fotos)</span></div>';

            allSpecies.forEach(species => {
                const speciesCatches = catches
                    .filter(c => c.fishType === species)
                    .sort((a, b) => b.length - a.length);
                const isEmpty = speciesCatches.length === 0;
                const star = isBonus(species) ? '⭐ ' : '';
                const isCustom = !fishSpecies.hasOwnProperty(species);

                html += `<div class="species-row ${isEmpty ? 'empty' : ''}">
                    <div class="species-head">
                        <span class="species-name">${star}${species}${isCustom ? ' ✏️' : ''}</span>
                    </div>`;

                if (!isEmpty) {
                    html += '<div class="species-catches">';
                    speciesCatches.forEach((c, i) => {
                        const isBest = i === 0;
                        const mine = me && c.angler === me;
                        const dateStr = c.photoDate || c.date || '';
                        const nPhotos = photosOf(c).length;
                        const fotoBadge = nPhotos > 1 ? `📷×${nPhotos}` : '📷';
                        html += `<div class="catch-chip ${isBest ? 'best' : ''}" onclick="openGallery('${c.id}')">
                            <span class="chip-angler">${isBest ? '👑 ' : ''}${c.angler}</span>
                            <span class="chip-len">${c.length} cm</span>
                            <span class="chip-date">${fotoBadge} ${dateStr}${c.weight ? '<br>' + c.weight + ' kg' : ''}</span>
                            ${mine ? `<button class="chip-del" onclick="event.stopPropagation(); deleteCatch('${c.id}')">🗑️</button>` : ''}
                        </div>`;
                    });
                    html += '</div>';
                }

                html += '</div>';
            });

            container.innerHTML = html;
            renderAuswertung();
        }

        // Auswertung unter dem Fangbuch (wie im Sheet: cm Gesamt, Punkte, Platz)
        function renderAuswertung() {
            const container = document.getElementById('auswertungContainer');
            let html = '<div class="auswertung-head">📊 Auswertung</div>';

            getStandings().forEach(s => {
                const topClass = !s.isSchneider && s.rank <= 3 ? 'top3' : '';
                const platz = s.isSchneider ? '🤡 Schneider' : `${s.rank}.${rankSymbol(s)}`;
                html += `<div class="aus-row ${topClass}">
                    <span class="aus-platz">${platz}</span>
                    <span class="aus-name">${s.angler}</span>
                    <span class="aus-cm">${s.points.totalLength} cm · ${s.points.species} Arten</span>
                    <span class="aus-punkte">${s.points.totalPoints} P</span>
                </div>`;
            });

            container.innerHTML = html;
        }

        function renderLeaderboard() {
            const container = document.getElementById('leaderboardContainer');
            let html = '<div class="leaderboard">';

            getStandings().forEach(s => {
                const rankClass = !s.isSchneider && s.rank <= 3 ? `rank-${s.rank}` : '';
                const medal = s.isSchneider ? '🤡 ' : (s.rank === 1 ? '🏆 ' : s.rank === 2 ? '🥈 ' : s.rank === 3 ? '🥉 ' : '');
                html += `
                    <div class="leaderboard-item">
                        <div class="rank ${rankClass}">${s.isSchneider ? '🤡' : s.rank}</div>
                        <div class="leaderboard-info">
                            <div class="leaderboard-name">${medal}${s.angler}${s.isSchneider ? ' (Schneider)' : ''}</div>
                            <div class="leaderboard-stats">${s.points.count} Fänge · ${s.points.species} Arten · ${s.points.totalLength} cm</div>
                        </div>
                        <div class="leaderboard-score">${s.points.totalPoints}</div>
                    </div>
                `;
            });

            html += '</div>';
            container.innerHTML = html;
        }

        // Rekorde: größter Fisch pro Art — wer hält ihn, cm anklickbar → Foto
        function renderRekorde() {
            const container = document.getElementById('rekordeContainer');

            if (catches.length === 0) {
                container.innerHTML = '<div class="rekord-leer">🎣 Noch keine Fänge — der erste Fisch jeder Art ist automatisch Rekord!</div>';
                return;
            }

            // Pro Art den größten Fang finden (bei Gleichstand: alle Halter)
            const records = {};
            catches.forEach(c => {
                const r = records[c.fishType];
                if (!r || c.length > r.length) {
                    records[c.fishType] = { length: c.length, holders: [c] };
                } else if (c.length === r.length && !r.holders.some(h => h.angler === c.angler)) {
                    r.holders.push(c);
                }
            });

            // Sortiert nach Länge absteigend — der dickste Brocken zuoberst
            const sorted = Object.entries(records).sort((a, b) => b[1].length - a[1].length);

            container.innerHTML = sorted.map(([species, r]) => {
                const star = isBonus(species) ? '⭐ ' : '';
                return r.holders.map((c, i) => {
                    const dateStr = c.photoDate || c.date || '';
                    const nPhotos = photosOf(c).length;
                    const fotoBadge = nPhotos > 1 ? `📷×${nPhotos}` : '📷';
                    return `<div class="rekord-row">
                        <img src="${c.photo}" class="rekord-thumb" loading="lazy" onclick="openGallery('${c.id}')" alt="${species}">
                        <div class="rekord-info">
                            <div class="rekord-art">${star}${species}${r.holders.length > 1 ? ' (geteilt)' : ''}</div>
                            <div class="rekord-halter">👑 ${c.angler} · ${fotoBadge} ${dateStr}${c.weight ? ' · ' + c.weight + ' kg' : ''}</div>
                        </div>
                        <span class="rekord-cm" onclick="openGallery('${c.id}')">${c.length} cm</span>
                    </div>`;
                }).join('');
            }).join('');
        }

        function renderInfo() {
            document.getElementById('regelnContainer').innerHTML = REGELN.map((r, i) =>
                `<div class="regel-item"><span class="regel-nr">${i + 1}.</span><span>${r}</span></div>`
            ).join('');

            const currentMonth = new Date().toLocaleDateString('de-DE', { month: 'long', timeZone: 'Europe/Berlin' });

            const legende = `<div class="kalender-legende">
                <span class="legende-item"><span class="legende-dot" style="background:#00b050;"></span>sehr gut</span>
                <span class="legende-item"><span class="legende-dot" style="background:#92d050;"></span>gut</span>
                <span class="legende-item"><span class="legende-dot" style="background:#ffd400;"></span>ok</span>
            </div>`;

            const monate = Object.entries(FANGKALENDER).map(([monat, arten]) => {
                const aktuell = monat === currentMonth;
                // Nach Fangchance absteigend sortieren (3 → 2 → 1), bei Gleichstand alphabetisch
                const sorted = Object.entries(arten).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'de'));
                const tags = sorted.map(([art, lvl]) =>
                    `<span class="art-tag lvl${lvl}">${isBonus(art) ? '⭐ ' : ''}${art}</span>`
                ).join('');
                return `<details class="monat ${aktuell ? 'aktuell' : ''}" ${aktuell ? 'open' : ''}>
                    <summary>${aktuell ? '📍 ' : ''}${monat}</summary>
                    <div class="monat-arten">${tags}</div>
                </details>`;
            }).join('');

            document.getElementById('kalenderContainer').innerHTML = legende + monate;
        }

        // ===== FOTO-GALERIE (mehrere Fotos pro Fang durchblättern) =====
        let galleryPhotos = [];
        let galleryIndex = 0;
        let galleryInfo = '';

        function photosOf(c) {
            return (c.photos && c.photos.length) ? c.photos : [c.photo];
        }

        function openGallery(catchId) {
            const c = catches.find(x => String(x.id) === String(catchId));
            if (!c) return;
            galleryPhotos = photosOf(c);
            galleryIndex = 0;
            galleryInfo = `${c.angler} – ${c.fishType} ${c.length} cm`;
            renderGallery();
            document.getElementById('photoModal').classList.add('active');
        }

        function renderGallery() {
            document.getElementById('modalPhoto').src = galleryPhotos[galleryIndex];
            const counter = galleryPhotos.length > 1 ? ` · Foto ${galleryIndex + 1}/${galleryPhotos.length}` : '';
            const tag = galleryIndex === 0 ? ' 📏' : ' 📸';
            document.getElementById('modalInfo').textContent = galleryInfo + counter + (galleryPhotos.length > 1 ? tag : '');
            const multi = galleryPhotos.length > 1;
            document.getElementById('galleryPrev').classList.toggle('visible', multi);
            document.getElementById('galleryNext').classList.toggle('visible', multi);
        }

        function galleryStep(dir) {
            event.stopPropagation();
            galleryIndex = (galleryIndex + dir + galleryPhotos.length) % galleryPhotos.length;
            renderGallery();
        }

        function closePhotoModal() {
            document.getElementById('photoModal').classList.remove('active');
        }

        document.getElementById('photoModal').addEventListener('click', closePhotoModal);

        // ===== LÖSCHEN (nur eigene) =====
        async function deleteCatch(id) {
            if (!confirm('Fang wirklich löschen?')) return;
            try {
                const res = await fetch(`/api/catches/${id}?deviceId=${encodeURIComponent(deviceId)}`, { method: 'DELETE' });
                if (res.status === 403) {
                    showToast('🚫 Nur eigene Fänge löschbar!', 'error');
                    return;
                }
                if (!res.ok) throw new Error();
                showToast('🗑️ Fang gelöscht');
                loadCatches();
            } catch (e) {
                showToast('❌ Fehler beim Löschen', 'error');
            }
        }

        // ===== DATEN LADEN (Live-Sync alle 5 Sek.) =====
        async function loadCatches() {
            try {
                const res = await fetch('/api/catches');
                const data = await res.json();
                if (JSON.stringify(data) !== JSON.stringify(catches)) {
                    catches = data;
                    renderAll();
                } else if (!document.body.dataset.rendered) {
                    renderAll();
                    document.body.dataset.rendered = '1';
                }
            } catch (e) { /* offline — nächster Versuch */ }
        }

        function renderAll() {
            renderDashboard();
            renderTable();
            renderLeaderboard();
            renderRekorde();
        }

        // ===== START =====
        populateSelects();
        renderInfo();
        renderAll();
        loadCatches();
        setInterval(loadCatches, 5000);
        window.addEventListener('focus', loadCatches);
    </script>
</body>
</html>
